name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN }}

  snyk-security:
    name: Security (Snyk)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        working-directory: ./task-manager
        run: npm ci

      - name: Snyk Code test (SAST)
        run: snyk code test --sarif-file-output=snyk-code.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk IaC test
        run: snyk iac test --report || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build Docker image pour Snyk
        run: |
          docker build -t itnum-backend:scan ./task-manager

      - name: Snyk Container monitor
        run: snyk container monitor itnum-backend:scan --file=task-manager/Dockerfile
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
        continue-on-error: true

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: snyk-security

    permissions:
      contents: read
      packages: write
      id-token: write       
      attestations: write  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: task-manager/package-lock.json

      - name: Install dependencies
        working-directory: ./task-manager
        run: npm ci

      - name: Lint
        working-directory: ./task-manager
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        working-directory: ./task-manager
        run: npm run test
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./task-manager
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/itnum-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/itnum-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/itnum-backend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/IT-NUM-Task-Manager || git clone https://github.com/${{ github.repository }} /app/IT-NUM-Task-Manager && cd /app/IT-NUM-Task-Manager

            git pull origin main

            # Creer le fichier .env depuis les secrets
            cat > .env << EOF
            NODE_ENV=${{ secrets.NODE_ENV }}
            HOST=${{ secrets.SSH_HOST }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            POSTGRES_SSL=${{ secrets.POSTGRES_SSL }}
            GRAFANA_USER=${{ secrets.GRAFANA_USER }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            PORT=${{ secrets.PORT }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_ACCESS_EXPIRES_IN=${{ secrets.JWT_ACCESS_EXPIRES_IN }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
            EOF

            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d

            docker image prune -af
            docker compose -f docker-compose.yml ps

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [secrets-scan, snyk-security, build, deploy]
    if: failure()

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [IT-NUM] Déploiement échoué - ${{ github.ref_name }}"
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            ❌ Le pipeline CI/CD a échoué !

            Détails :
            - Repo     : ${{ github.repository }}
            - Branche  : ${{ github.ref_name }}
            - Commit   : ${{ github.sha }}
            - Auteur   : ${{ github.actor }}

            👉 Voir les logs :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [IT-NUM] Déploiement réussi - ${{ github.ref_name }}"
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            ✅ Le déploiement s'est terminé avec succès !

            Détails :
            - Repo     : ${{ github.repository }}
            - Branche  : ${{ github.ref_name }}
            - Commit   : ${{ github.sha }}
            - Auteur   : ${{ github.actor }}

            🌐 Application accessible sur :
            http://${{ secrets.SSH_HOST }}/api
            http://${{ secrets.SSH_HOST }}/docs
            http://${{ secrets.SSH_HOST }}:3001

            👉 Voir le pipeline :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}